<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FPS Target Game</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <style>
      html, body, #root { margin:0; padding:0; width:100%; height:100%; background:#111; color:#fff; font-family: system-ui, sans-serif; }
      body { overflow:hidden; }
      .overlay { position:fixed; top:0; left:0; right:0; padding:8px 12px; display:flex; gap:16px; align-items:center; font-size:14px; background:rgba(0,0,0,0.2); backdrop-filter: blur(4px); }
      .panel { background:rgba(0,0,0,0.6); padding:12px; border:1px solid #333; border-radius:6px; }
      button { cursor:pointer; }
      .centerMessage { position:fixed; top:50%; left:50%; transform:translate(-50%, -50%); text-align:center; }
      canvas { display:block; outline:none; }
      .scoreboard { position:fixed; right:8px; top:60px; width:200px; max-height:50%; overflow:auto; font-size:12px; background:rgba(0,0,0,.4); padding:8px; border-radius:6px; }
      .gameover { position:fixed; inset:0; display:flex; flex-direction:column; justify-content:center; align-items:center; background:rgba(0,0,0,.7); }
      @media (max-width:700px){ .overlay { flex-wrap:wrap; } .scoreboard{display:none;} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
